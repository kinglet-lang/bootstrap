name: CI

on:
  push:
    branches: [canon]
  pull_request:
    branches: [canon]

jobs:
  build-and-test-unix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Cache the source-built LLVM (tools/llvm). First run builds (~30 min),
      # later runs restore in seconds. Key bumps with LLVM version or bootstrap
      # changes so a stale cache never masks a logic change.
      - uses: actions/cache@v4
        with:
          path: tools/llvm
          key: llvm-src-22.1.8-${{ runner.os }}-${{ hashFiles('scripts/bootstrap.sh') }}

      # Pinned GN + Ninja + LLVM (source-built) via scripts/bootstrap.sh.
      # bootstrap.sh skips the LLVM build when tools/llvm is restored above.
      - name: Set up pinned toolchain (GN + Ninja + LLVM)
        shell: bash
        run: |
          bash scripts/bootstrap.sh
          echo "$PWD/tools/bin" >> "$GITHUB_PATH"
          echo "LLVM_CONFIG=$PWD/tools/llvm/bin/llvm-config" >> "$GITHUB_ENV"

      - name: Generate build files
        shell: bash
        run: |
          gn gen out/Debug --args="is_debug=false enable_llvm=true llvm_config=\"$LLVM_CONFIG\""

      - name: Build
        shell: bash
        run: ninja -C out/Debug

      - name: Run golden tests
        shell: bash
        run: |
          export KINGLET="$PWD/out/Debug/kinglet"
          export KINGLET_SKIP_REBUILD=1
          bash tests/cli/run_golden.sh

  # Windows: Git Bash + non-LLVM kinglet is enough for compile-only golden
  # (--check / --ast / --ir / --bytecode). Native `run` is unsupported on
  # _WIN32; MSYS2+LLVM builds were failing the golden harness itself.
  build-and-test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pinned toolchain (GN + Ninja)
        shell: pwsh
        run: |
          pwsh -File scripts/bootstrap.ps1
          Add-Content -Path $env:GITHUB_PATH -Value "$PWD\tools\bin"

      - name: Generate build files
        shell: bash
        run: |
          gn gen out/Debug --args="is_debug=false"

      - name: Build
        shell: bash
        run: ninja -C out/Debug kinglet

      - name: Run golden tests (compile-only)
        shell: bash
        run: |
          export KINGLET="$PWD/out/Debug/kinglet"
          export KINGLET_SKIP_RUN=1
          export KINGLET_SKIP_REBUILD=1
          bash tests/sema/run.sh
          bash tests/parser/run.sh
          bash tests/codegen/run.sh
          bash tests/ir/run.sh

      - name: Compile smoke
        shell: bash
        run: |
          ./out/Debug/kinglet.exe --check tests/exec/cases/structs_basic.kl
          ./out/Debug/kinglet.exe --ir tests/exec/cases/structs_basic.kl >/dev/null
