name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-unix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GN
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            curl -Lo gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/mac-arm64/+/latest"
          else
            curl -Lo gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest"
          fi
          unzip gn.zip -d "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install LLVM
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install llvm
            echo "LLVM_CONFIG=$(brew --prefix llvm)/bin/llvm-config" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y llvm-dev clang python-is-python3
            echo "LLVM_CONFIG=$(ls /usr/lib/llvm-*/bin/llvm-config | sort -V | tail -1)" >> "$GITHUB_ENV"
          fi

      - name: Generate build files
        shell: bash
        run: |
          gn gen out/Debug --args="is_debug=false enable_llvm=true llvm_config=\"$LLVM_CONFIG\""

      - name: Build
        shell: bash
        run: ninja -C out/Debug

      - name: Run golden tests
        shell: bash
        run: |
          export KINGLET="$PWD/out/Debug/kinglet"
          bash tests/cli/run_golden.sh

  build-and-test-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      # gn ships as a native Windows binary that emits drive-letter paths, which
      # MSYS2's python cannot open. Use a native Windows python for gn's
      # exec_script (--script-executable) instead.
      - name: Set up native Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            unzip
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-ninja

      - name: Install GN
        run: |
          curl -Lo gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest"
          unzip -o gn.zip -d /usr/bin

      - name: Generate build files
        run: |
          PYW="$(cygpath -m "$pythonLocation")/python.exe"
          LLVMW="$(cygpath -m /mingw64/bin/llvm-config.exe)"
          gn gen out/Debug \
            --script-executable="$PYW" \
            --args="is_debug=false enable_llvm=true llvm_config=\"$LLVMW\""

      - name: Build
        run: ninja -C out/Debug

      # Native program execution (kinglet run) is not implemented on Windows yet.
      - name: Run golden tests (compile-only)
        run: |
          export KINGLET="$PWD/out/Debug/kinglet"
          export KINGLET_SKIP_RUN=1
          bash tests/cli/run_golden.sh

      - name: Native compile smoke
        run: |
          ./out/Debug/kinglet --check tests/cli/cases/structs_basic.kl
          ./out/Debug/kinglet --bytecode tests/cli/cases/structs_basic.kl >/dev/null
