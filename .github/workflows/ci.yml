name: CI

on:
  pull_request:
    branches: [canon]

jobs:
  build-and-test-unix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Pinned GN + Ninja via scripts/bootstrap.sh. LLVM: installed from
      # system packages below (see docs/BUILD.md for supported versions).
      - name: Set up pinned GN + Ninja
        shell: bash
        run: |
          bash scripts/bootstrap.sh
          echo "$PWD/tools/bin" >> "$GITHUB_PATH"

      - name: Install LLVM
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install llvm
            echo "LLVM_CONFIG=$(brew --prefix llvm)/bin/llvm-config" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y llvm-dev clang
            echo "LLVM_CONFIG=$(ls /usr/lib/llvm-*/bin/llvm-config | sort -V | tail -1)" >> "$GITHUB_ENV"
          fi

      - name: Generate build files
        shell: bash
        run: |
          gn gen out/Debug --args="is_debug=false enable_llvm=true llvm_config=\"$LLVM_CONFIG\""

      - name: Build
        shell: bash
        run: ninja -C out/Debug

      - name: Run golden tests
        shell: bash
        run: |
          export KINGLET="$PWD/out/Debug/kinglet"
          export KINGLET_SKIP_REBUILD=1
          bash tests/cli/run_golden.sh

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pinned GN + Ninja
        shell: bash
        run: |
          bash scripts/bootstrap.sh
          echo "$PWD/tools/bin" >> "$GITHUB_PATH"

      - name: Install LLVM
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev clang
          echo "LLVM_CONFIG=$(ls /usr/lib/llvm-*/bin/llvm-config | sort -V | tail -1)" >> "$GITHUB_ENV"

      - name: Generate build files
        shell: bash
        run: |
          gn gen out/Sanitizers --args="is_debug=false enable_llvm=true sanitizer=\"address,undefined\" llvm_config=\"$LLVM_CONFIG\""

      - name: Build
        shell: bash
        run: ninja -C out/Sanitizers

      - name: Run golden tests
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          export KINGLET="$PWD/out/Sanitizers/kinglet"
          export KINGLET_SKIP_REBUILD=1
          bash tests/cli/run_golden.sh

  # Windows: Git Bash + non-LLVM kinglet is enough for compile-only golden
  # (--check / --ast / --ir / --bytecode). Native `run` is unsupported on
  # _WIN32; MSYS2+LLVM builds were failing the golden harness itself.
  build-and-test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pinned toolchain (GN + Ninja)
        shell: pwsh
        run: |
          pwsh -File scripts/bootstrap.ps1
          Add-Content -Path $env:GITHUB_PATH -Value "$PWD\tools\bin"

      - name: Generate build files
        shell: bash
        run: |
          gn gen out/Debug --args="is_debug=false"

      - name: Build
        shell: bash
        run: ninja -C out/Debug kinglet

      - name: Run golden tests (compile-only)
        shell: bash
        run: |
          export KINGLET="$PWD/out/Debug/kinglet"
          export KINGLET_SKIP_RUN=1
          export KINGLET_SKIP_REBUILD=1
          bash tests/sema/run.sh
          bash tests/parser/run.sh
          bash tests/codegen/run.sh
          bash tests/ir/run.sh

      - name: Compile smoke
        shell: bash
        run: |
          ./out/Debug/kinglet.exe --check tests/exec/cases/structs_basic.kl
          ./out/Debug/kinglet.exe --ir tests/exec/cases/structs_basic.kl >/dev/null
