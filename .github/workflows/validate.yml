name: Validate PR
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  commit-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9/._-]+\))?!?: .+'
          if echo "$TITLE" | grep -qE "$pattern"; then
            echo "✓ PR title is valid: $TITLE"
          else
            echo "✗ PR title does not follow conventional commits format."
            echo "  Expected: type(scope): description"
            echo "  Example:  feat(parser): add expression folding"
            echo "  Got:      $TITLE"
            exit 1
          fi

      - name: Validate PR body
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$BODY" ]; then
            echo "✗ PR body is empty."
            echo "  A description with the following sections is required:"
            echo ""
            echo "    **Summary**"
            echo "    <overview of the change>"
            echo ""
            echo "    **Changes**"
            echo "    - <change 1>"
            echo "    - <change 2>"
            echo ""
            echo "    **Testing**"
            echo "    <how the change was verified>"
            exit 1
          fi

          body_len=$(printf '%s' "$BODY" | wc -c)
          if [ "$body_len" -lt 50 ]; then
            echo "✗ PR body is too short ($body_len chars, minimum 50 chars)."
            echo "  A meaningful description helps reviewers and produces"
            echo "  a readable squash merge commit message."
            exit 1
          fi

          missing=""
          if ! echo "$BODY" | grep -qi '^\*\*[Ss]ummary\*\*'; then
            missing="$missing  **Summary**\n"
          fi
          if ! echo "$BODY" | grep -qi '^\*\*[Cc]hanges\*\*'; then
            missing="$missing  **Changes**\n"
          fi
          if ! echo "$BODY" | grep -qi '^\*\*[Tt]esting\*\*'; then
            missing="$missing  **Testing**\n"
          fi

          if [ -n "$missing" ]; then
            echo "✗ PR body is missing required section(s):"
            printf '%b' "$missing"
            echo ""
            echo "  Expected format:"
            echo ""
            echo "    **Summary**"
            echo "    <overview of the change>"
            echo ""
            echo "    **Changes**"
            echo "    - <change 1>"
            echo "    - <change 2>"
            echo ""
            echo "    **Testing**"
            echo "    <how the change was verified>"
            exit 1
          fi

          echo "✓ PR body is valid ($body_len chars, all sections present)."

      - name: Validate commit messages
        run: |
          base_ref="${{ github.event.pull_request.base.sha }}"
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9/._-]+\))?!?: .+'

          bad_commits=""
          while IFS= read -r commit_msg; do
            if ! echo "$commit_msg" | grep -qE "$pattern"; then
              bad_commits="$bad_commits\n  $commit_msg"
            fi
          done < <(git log --format=%s --no-merges "$base_ref..HEAD")

          if [ -n "$bad_commits" ]; then
            echo "✗ The following commit messages do not follow conventional commits format:"
            echo -e "$bad_commits"
            echo ""
            echo "  Expected: type(scope): description"
            echo "  Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "  Examples:"
            echo "    feat(parser): add pattern matching for fold expressions"
            echo "    fix: correct SFINAE constraint on decay_t"
            echo "    docs: add API reference for when()"
            exit 1
          fi

          commit_count=$(git log --format=%s --no-merges "$base_ref..HEAD" | wc -l)
          echo "✓ All $commit_count commit messages follow conventional commits format."
