name: Auto Merge

on:
  workflow_run:
    workflows: [CI, Lint]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: automerge
  cancel-in-progress: false

jobs:
  automerge:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AUTOMERGE_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Enable auto-merge on ready PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          prs=$(gh pr list -R "$REPO" --state open \
            --json number,statusCheckRollup,mergeable \
            --jq '.[] | select(.statusCheckRollup | map(select(.conclusion != "" and .conclusion != "SUCCESS")) | length == 0) | select(.mergeable == "MERGEABLE") | .number')

          if [ -z "$prs" ]; then
            echo "No PRs with all checks passed."
            exit 0
          fi

          echo "PRs ready for auto-merge: $prs"
          for num in $prs; do
            echo "Enabling auto-merge for PR #$num..."

            # Strip markdown formatting so the commit message reads as plain text.
            pr_body=$(gh api "repos/$REPO/pulls/$num" --jq '.body' \
              | sed 's/\*\*//g; s/`//g')

            gh pr merge "$num" --auto --squash --body "$pr_body"
            echo "  Auto-merge enabled."
          done
