name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # macOS + Linux: LLVM-enabled native build. The VM-only configuration is no
  # longer published — every release archive ships the LLVM backend.
  build-unix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: kinglet-linux-x64
          - os: macos-latest
            artifact: kinglet-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GN
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            curl -Lo gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/mac-arm64/+/latest"
          else
            curl -Lo gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest"
          fi
          unzip gn.zip -d "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install LLVM
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install llvm
            echo "LLVM_CONFIG=$(brew --prefix llvm)/bin/llvm-config" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y llvm-dev clang
            # llvm-dev installs a versioned llvm-config under /usr/lib/llvm-*/bin.
            echo "LLVM_CONFIG=$(ls /usr/lib/llvm-*/bin/llvm-config | sort -V | tail -1)" >> "$GITHUB_ENV"
          fi

      - name: Generate build files
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gn gen out/Release --args="is_debug=false enable_llvm=true llvm_config=\"$LLVM_CONFIG\" kinglet_version=\"$VERSION\""

      - name: Build
        shell: bash
        run: ninja -C out/Release kinglet kinglet_rt

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist
          cp out/Release/kinglet dist/
          # Native backend links user programs against the static runtime; it must
          # sit beside the kinglet binary (see resolve_rt_lib in compiler/driver/kinglet/main.cc).
          cp out/Release/obj/runtime/libkinglet_rt.a dist/
          bash scripts/stage-klet-alias.sh dist
          cd dist && tar czf "../${{ matrix.artifact }}.tar.gz" *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # Windows uses the MSYS2/mingw64 clang toolchain, which (unlike the official
  # LLVM installer) ships clang++, llvm-ar, and llvm-config + dev libs together —
  # matching build/toolchain/BUILD.gn's win toolchain.
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      # gn ships as a native Windows binary that emits drive-letter paths, which
      # MSYS2's python cannot open. Use a native Windows python for gn's
      # exec_script (--script-executable) instead.
      - name: Set up native Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            unzip
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-ninja

      - name: Install GN
        # Extract into /usr/bin (always on the MSYS2 PATH); GITHUB_PATH does not
        # reliably cross into the msys2 shell environment.
        run: |
          curl -Lo gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest"
          unzip -o gn.zip -d /usr/bin

      - name: Generate build files
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Native gn + native python need Windows-style paths; convert with cygpath.
          PYW="$(cygpath -m "$pythonLocation")/python.exe"
          LLVMW="$(cygpath -m /mingw64/bin/llvm-config.exe)"
          gn gen out/Release \
            --script-executable="$PYW" \
            --args="is_debug=false enable_llvm=true llvm_config=\"$LLVMW\" kinglet_version=\"$VERSION\""

      - name: Build
        run: ninja -C out/Release kinglet kinglet_rt

      - name: Package binaries
        run: |
          mkdir -p dist
          cp out/Release/kinglet.exe dist/
          # Windows runtime archive is kinglet_rt.lib (see win alink in build/toolchain).
          cp out/Release/obj/runtime/kinglet_rt.lib dist/
          bash scripts/stage-klet-alias.sh dist
          cd dist && tar czf "../kinglet-windows-x64.tar.gz" *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kinglet-windows-x64
          path: kinglet-windows-x64.tar.gz

  release:
    needs: [build-unix, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives and checksums
        run: |
          mkdir -p out
          find artifacts -name '*.tar.gz' -exec cp {} out/ \;
          (cd out && sha256sum *.tar.gz > SHA256SUMS)
          cat out/SHA256SUMS

      - name: Resolve changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG="docs/changelog/v${VERSION}.md"
          if [ -f "$CHANGELOG" ]; then
            echo "body_path=$CHANGELOG" >> $GITHUB_OUTPUT
          else
            echo "body_path=" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # SemVer pre-releases carry a hyphen (e.g. v0.1.0-rc.1); flag them so
          # they do not become the "Latest" release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: ${{ steps.changelog.outputs.body_path || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.body_path == '' }}
          files: |
            out/kinglet-windows-x64.tar.gz
            out/kinglet-linux-x64.tar.gz
            out/kinglet-macos-arm64.tar.gz
            out/SHA256SUMS
